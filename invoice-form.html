<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Invoice</title>
<style>
:root{color-scheme:light}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f2f2f7;color:#1c1c1e;min-height:100vh;padding-bottom:52px}

/* HEADER */
.hdr{background:#fff;padding:14px 16px 12px;border-bottom:1px solid #e5e5ea;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.hdr h1{font-size:19px;font-weight:700;color:#007aff;margin-bottom:11px}
.row2{display:flex;gap:10px}
.fg{flex:1;display:flex;flex-direction:column;gap:3px}
.fg label{font-size:11px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.4px}
.fg input{height:44px;border:1.5px solid #e5e5ea;border-radius:10px;padding:0 11px;font-size:15px;color:#1c1c1e;background:#f9f9fb;outline:none;width:100%;-webkit-appearance:none;appearance:none}
.fg input:focus{border-color:#007aff;background:#fff}

/* SECTION */
.sec{font-size:11px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.5px;padding:13px 16px 5px}

/* SEARCH */
.swrap{padding:0 16px 8px}
.sbox{display:flex;align-items:center;background:#e9e9ef;border-radius:10px;padding:0 11px;gap:7px}
.sbox svg{color:#8e8e93;flex-shrink:0}
.sbox input{flex:1;height:40px;border:none;background:transparent;font-size:16px;color:#1c1c1e;outline:none}
.sbox input::placeholder{color:#8e8e93}
.clr{color:#8e8e93;cursor:pointer;font-size:17px;padding:4px;display:none;line-height:1}

/* BRAND CHIPS */
.chips-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 16px 10px;display:flex;gap:7px;scrollbar-width:none}
.chips-wrap::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;height:32px;padding:0 13px;border-radius:16px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:#e9e9ef;color:#1c1c1e;white-space:nowrap;-webkit-appearance:none;appearance:none}
.chip.active{background:#007aff;color:#fff}

/* PRODUCT LIST */
.plist{background:#fff;border-radius:12px;margin:0 16px;overflow:hidden;border:1px solid #e5e5ea;max-height:240px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pitem{display:flex;align-items:center;padding:11px 13px;border-bottom:1px solid #f2f2f7;cursor:pointer;gap:8px;min-height:50px}
.pitem:last-child{border-bottom:none}
.pitem:active{background:#f0f4ff}
.pitem.ic{opacity:.35;pointer-events:none}
.pname{font-size:14px;color:#1c1c1e;line-height:1.3;flex:1}
.ptag{font-size:12px;font-weight:600;white-space:nowrap}
.ptag.has{color:#34c759}
.ptag.no{color:#ff9500}
.addcircle{width:28px;height:28px;background:#007aff;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nores{padding:22px 16px;text-align:center;color:#8e8e93;font-size:14px}

/* CART */
.clist{background:#fff;border-radius:12px;margin:0 16px;overflow:hidden;border:1px solid #e5e5ea}
.cempty{padding:26px 16px;text-align:center;color:#8e8e93;font-size:14px}
.cempty-icon{font-size:28px;margin-bottom:5px}
.citem{padding:11px 13px;border-bottom:1px solid #f2f2f7}
.citem:last-child{border-bottom:none}
.ctop{display:flex;align-items:flex-start;gap:8px;margin-bottom:9px}
.cname{font-size:14px;font-weight:500;color:#1c1c1e;line-height:1.3;flex:1}
.rmbtn{width:26px;height:26px;background:#ff3b30;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0;margin-top:1px}
.ctrls{display:flex;gap:9px}
.ctrl{flex:1;display:flex;flex-direction:column;gap:3px}
.ctrl label{font-size:11px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.4px}
.ctrl input{height:42px;border:1.5px solid #e5e5ea;border-radius:10px;padding:0 10px;font-size:16px;color:#1c1c1e;background:#f9f9fb;outline:none;width:100%;-webkit-appearance:none;appearance:none}
.ctrl input:focus{border-color:#007aff;background:#fff}
.ctrl input.np{border-color:#ff9500;background:#fff9f0}
.nlbl{font-size:11px;color:#ff9500;margin-top:2px}
.sub{font-size:12px;color:#8e8e93;text-align:right;margin-top:6px}
.sub b{color:#1c1c1e}

/* TOTAL */
.tbar{background:#fff;border-radius:12px;margin:0 16px;padding:13px 15px;border:1px solid #e5e5ea;display:flex;justify-content:space-between;align-items:center}
.tlbl{font-size:15px;font-weight:600}
.tamt{font-size:21px;font-weight:700;color:#007aff}
.mnote{font-size:12px;color:#ff9500;padding:4px 16px 0}

/* EXPORT BTN */
.expbtn{display:block;width:calc(100% - 32px);margin:0 16px;height:52px;background:#007aff;color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:600;cursor:pointer;-webkit-appearance:none;appearance:none}
.expbtn:active{opacity:.82}

/* MODAL */
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.moverlay.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:72vh;padding:18px 15px 36px;display:flex;flex-direction:column;gap:11px}
.modal h2{font-size:16px;font-weight:700}
.modal p{font-size:13px;color:#8e8e93;line-height:1.4}
.csvbox{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#f2f2f7;border-radius:10px;padding:11px;font-size:11px;font-family:monospace;white-space:pre;color:#1c1c1e;min-height:110px;max-height:230px;-webkit-user-select:all;user-select:all}
.mbtns{display:flex;gap:9px}
.copybtn{flex:1;height:48px;background:#007aff;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
.copybtn:active{opacity:.8}
.copybtn.done{background:#34c759}
.closebtn{height:48px;padding:0 17px;background:#e9e9ef;color:#1c1c1e;border:none;border-radius:12px;font-size:16px;font-weight:500;cursor:pointer}

.gap{height:11px}
</style>
</head>

<div class="hdr">
  <h1>🧾 Invoice</h1>
  <div class="row2">
    <div class="fg"><label>Customer Name</label>
      <input type="text" id="cname" placeholder="Enter name" autocomplete="off" autocorrect="off" autocapitalize="words"></div>
    <div class="fg"><label>Date</label>
      <input type="date" id="idate"></div>
  </div>
</div>

<div class="sec">Add Products</div>
<div class="swrap">
  <div class="sbox">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="srch" placeholder="Search products…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <span class="clr" id="clrbtn">&#x2715;</span>
  </div>
</div>
<div class="chips-wrap" id="chips"></div>
<div class="plist" id="plist"></div>

<div class="gap"></div>
<div class="sec">Invoice Items</div>
<div class="clist" id="clist"><div class="cempty"><div class="cempty-icon">🛒</div>Tap a product above to add it</div></div>

<div class="gap"></div>
<div class="tbar"><span class="tlbl">Total</span><span class="tamt" id="tamt">IQD 0</span></div>
<div class="mnote" id="mnote" style="display:none">⚠️ Some prices are missing — total may be incomplete</div>

<div class="gap"></div>
<button class="expbtn" id="expbtn">Export CSV</button>
<div class="gap"></div>

<!-- CSV MODAL -->
<div class="moverlay" id="moverlay">
  <div class="modal">
    <h2>📋 CSV Ready</h2>
    <p>Tap <strong>Copy</strong> then paste into WhatsApp, Notes, or email. Or long-press to Select All.</p>
    <div class="csvbox" id="csvbox"></div>
    <div class="mbtns">
      <button class="copybtn" id="copybtn">Copy CSV</button>
      <button class="closebtn" id="closebtn">Close</button>
    </div>
  </div>
</div>

// Deduplicate by name (case-insensitive)
(function(){
  var seen={};
  P=P.filter(function(x){
    var k=x.n.toLowerCase();
    if(seen[k]) return false;
    seen[k]=1;
    return true;
  });
  // Sort each brand group A-Z
  P.sort(function(a,b){return a.n.toLowerCase()<b.n.toLowerCase()?-1:1});
})();

// Brand detection
var BRANDS=['All','NOW','Puritans','Mason','Swanson','Nutricost','Century','Natrol',"Nature's Truth","Nature's Bounty",'Centrum',"Doctor's Best",'Sundance','Other'];
function getBrand(n){
  var l=n.toLowerCase();
  if(l.includes('puritans')) return 'Puritans';
  if(l.includes('swanson')) return 'Swanson';
  if(l.includes('mason') || l.includes('masnon')) return 'Mason';
  if(l.includes('nutricost')) return 'Nutricost';
  if(l.includes('century') || l.includes('cenutry') || l.includes('centruy')) return 'Century';
  if(l.includes('natrol')) return 'Natrol';
  if(l.includes('natures truth') || l.includes('nautres truth') || l.includes('natures truth')) return "Nature's Truth";
  if(l.includes('natures bounty')) return "Nature's Bounty";
  if(l.includes('centrum')) return 'Centrum';
  if(l.includes('doctors best') || l.includes('docotrs') || l.includes('doctures')) return "Doctor's Best";
  if(l.includes('sundance')) return 'Sundance';
  if(l.includes('now')) return 'NOW';
  return 'Other';
}

var cart=[];
var activeBrand='All';

// Default date
var t=new Date();
document.getElementById('idate').value=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');

// ── CHIPS
function renderChips(){
  var el=document.getElementById('chips');
  el.innerHTML=BRANDS.map(function(b){
    return '<button class="chip'+(activeBrand===b?' active':'')+'" data-brand="'+esc(b)+'">'+esc(b)+'</button>';
  }).join('');
}
document.getElementById('chips').addEventListener('click',function(e){
  var btn=e.target;
  if(btn.classList.contains('chip')){
    activeBrand=btn.getAttribute('data-brand');
    renderChips();
    renderProducts();
  }
});

// ── PRODUCTS
function renderProducts(){
  var q=document.getElementById('srch').value.toLowerCase().trim();
  var el=document.getElementById('plist');
  var inCartNames={};
  cart.forEach(function(c){inCartNames[c.n.toLowerCase()]=1;});
  var filtered=P.filter(function(x){
    if(q && x.n.toLowerCase().indexOf(q)===-1) return false;
    if(!q && activeBrand!=='All' && getBrand(x.n)!==activeBrand) return false;
    return true;
  });
  if(!filtered.length){el.innerHTML='<div class="nores">No products found</div>';return;}
  el.innerHTML=filtered.map(function(x,i){
    var ic=inCartNames[x.n.toLowerCase()]?1:0;
    var ptag=x.p!=null?'<span class="ptag has">IQD '+x.p.toLocaleString()+'</span>':'<span class="ptag no">Price needed</span>';
    return '<div class="pitem'+(ic?' ic':'')+'" data-idx="'+P.indexOf(x)+'">'+
      '<span class="pname">'+esc(x.n)+'</span>'+ptag+
      '<div class="addcircle"><svg width="13" height="13" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></div>'+
      '</div>';
  }).join('');
}
document.getElementById('plist').addEventListener('click',function(e){
  var el=e.target;
  while(el&&el!==this){
    if(el.classList.contains('pitem')){addToCart(parseInt(el.getAttribute('data-idx'),10));return;}
    el=el.parentElement;
  }
});

// ── SEARCH
document.getElementById('srch').addEventListener('input',function(){
  document.getElementById('clrbtn').style.display=this.value?'block':'none';
  renderProducts();
});
document.getElementById('clrbtn').addEventListener('click',function(){
  document.getElementById('srch').value='';
  this.style.display='none';
  renderProducts();
});

// ── CART
function addToCart(idx){
  var prod=P[idx];
  if(!prod||cart.some(function(c){return c.n===prod.n;})) return;
  cart.push({n:prod.n,base:prod.p,qty:1,cp:prod.p});
  renderCart();renderProducts();updateTotal();
}
function removeFromCart(ci){
  cart.splice(ci,1);
  renderCart();renderProducts();updateTotal();
}
function renderCart(){
  var el=document.getElementById('clist');
  if(!cart.length){el.innerHTML='<div class="cempty"><div class="cempty-icon">🛒</div>Tap a product above to add it</div>';return;}
  el.innerHTML=cart.map(function(item,ci){
    var missing=item.base==null;
    var pv=item.cp!=null?item.cp:'';
    var sub=(pv!==''&&pv!=null)?'Subtotal: <b>IQD '+(item.cp*item.qty).toLocaleString()+'</b>':'<span style="color:#ff9500">Price missing</span>';
    return '<div class="citem">'+
      '<div class="ctop"><span class="cname">'+esc(item.n)+'</span>'+
      '<button class="rmbtn" data-action="rm" data-ci="'+ci+'" type="button"><svg width="11" height="11" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>'+
      '<div class="ctrls">'+
      '<div class="ctrl"><label>Qty</label>'+
      '<input type="number" inputmode="numeric" min="1" value="'+item.qty+'" data-action="qty" data-ci="'+ci+'"></div>'+
      '<div class="ctrl"><label>Unit Price (IQD)</label>'+
      '<input type="number" inputmode="decimal" min="0" placeholder="'+(missing?'Enter price…':'')+'" value="'+(pv!==''?pv:'')+'" class="'+(missing?'np':'')+'" data-action="price" data-ci="'+ci+'">'+
      (missing?'<div class="nlbl">⚠️ Not in sheet</div>':'')+
      '</div></div>'+
      '<div class="sub" id="sub'+ci+'">'+sub+'</div>'+
      '</div>';
  }).join('');
}
document.getElementById('clist').addEventListener('click',function(e){
  var btn=e.target;
  while(btn&&btn!==this){
    if(btn.getAttribute('data-action')==='rm'){removeFromCart(parseInt(btn.getAttribute('data-ci'),10));return;}
    btn=btn.parentElement;
  }
});
document.getElementById('clist').addEventListener('input',function(e){
  var inp=e.target,a=inp.getAttribute('data-action'),ci=parseInt(inp.getAttribute('data-ci'),10);
  if(isNaN(ci)) return;
  if(a==='qty'){cart[ci].qty=Math.max(1,parseInt(inp.value,10)||1);}
  else if(a==='price'){var v=inp.value.trim();cart[ci].cp=v===''?null:parseFloat(v);}
  refreshSub(ci);updateTotal();
});
function refreshSub(ci){
  var el=document.getElementById('sub'+ci);if(!el) return;
  var item=cart[ci];
  el.innerHTML=(item.cp!=null&&item.cp!=='')?'Subtotal: <b>IQD '+(item.cp*item.qty).toLocaleString()+'</b>':'<span style="color:#ff9500">Price missing</span>';
}
function updateTotal(){
  var tot=0,miss=false;
  cart.forEach(function(c){c.cp!=null?tot+=c.cp*c.qty:miss=true;});
  document.getElementById('tamt').textContent='IQD '+tot.toLocaleString();
  document.getElementById('mnote').style.display=miss?'block':'none';
}

// ── EXPORT
document.getElementById('expbtn').addEventListener('click',function(){
  var cn=document.getElementById('cname').value.trim();
  var dt=document.getElementById('idate').value;
  if(!cn){alert('Please enter a customer name.');document.getElementById('cname').focus();return;}
  if(!dt){alert('Please select a date.');return;}
  if(!cart.length){alert('Please add at least one product.');return;}
  if(cart.some(function(c){return c.cp==null;})){if(!confirm('Some items are missing a price. Export anyway?')) return;}

  var rows=[['Customer Name','Date','Product Name','Unit Price (IQD)','Quantity','Total (IQD)']];
  cart.forEach(function(item){
    var up=item.cp!=null?item.cp:'';
    var tot=up!==''?(parseFloat(up)*item.qty):'';
    rows.push([cn,dt,item.n,up,item.qty,tot]);
  });
  var csv=rows.map(function(r){
    return r.map(function(c){
      var s=String(c);
      return(s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0)?'"'+s.replace(/"/g,'""')+'"':s;
    }).join(',');
  }).join('\n');

  // Try download (desktop/Android)
  var done=false;
  try{
    var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download='invoice_'+cn.replace(/\s+/g,'_')+'_'+dt+'.csv';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
    done=true;
  }catch(e){done=false;}

  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  if(isIOS||!done){
    document.getElementById('csvbox').textContent=csv;
    document.getElementById('copybtn').textContent='Copy CSV';
    document.getElementById('copybtn').className='copybtn';
    document.getElementById('moverlay').classList.add('open');
  }

  // Clear form
  document.getElementById('cname').value='';
  var t2=new Date();
  document.getElementById('idate').value=t2.getFullYear()+'-'+String(t2.getMonth()+1).padStart(2,'0')+'-'+String(t2.getDate()).padStart(2,'0');
  cart=[];renderCart();renderProducts();updateTotal();
});

// ── MODAL
document.getElementById('copybtn').addEventListener('click',function(){
  var txt=document.getElementById('csvbox').textContent;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){
      document.getElementById('copybtn').textContent='✓ Copied!';
      document.getElementById('copybtn').className='copybtn done';
    }).catch(function(){fbCopy(txt);});
  } else {fbCopy(txt);}
});
function fbCopy(text){
  var ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;left:-9999px;top:-9999px;';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');
    document.getElementById('copybtn').textContent='✓ Copied!';
    document.getElementById('copybtn').className='copybtn done';
  }catch(e){alert('Long-press the text above → Select All → Copy.');}
  document.body.removeChild(ta);
}
document.getElementById('closebtn').addEventListener('click',function(){document.getElementById('moverlay').classList.remove('open');});
document.getElementById('moverlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── INIT
renderChips();
renderProducts();
</script>
